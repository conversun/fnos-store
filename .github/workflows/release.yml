name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'

      - name: Build Frontend
        run: |
          cd frontend
          npm ci
          npm run build

      - name: Build Linux amd64
        run: GOOS=linux GOARCH=amd64 go build -o store-server-linux-amd64 ./cmd/server/

      - name: Build Linux arm64
        run: GOOS=linux GOARCH=arm64 go build -o store-server-linux-arm64 ./cmd/server/

      - name: Create Release
        run: |
          TAG="${{ github.ref_name }}"
          if gh release view "$TAG" &>/dev/null; then
            echo "Release $TAG exists, uploading assets..."
            gh release upload "$TAG" \
              store-server-linux-amd64 \
              store-server-linux-arm64 \
              --clobber
          else
            gh release create "$TAG" \
              --title "fnos-store $TAG" \
              --generate-notes \
              store-server-linux-amd64 \
              store-server-linux-arm64
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
